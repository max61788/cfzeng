<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
	
  <title>首爾旅遊筆記</title>
  <style>
    :root{
      --bg:#eaf6fb;
      --card:#ffffff;
      --text:#263238;
      --sub:#607d8b;
      --accent:#1e88e5;
      --accent2:#26c6da;
      --line:#cfd8dc;
      --shadow:0 4px 12px rgba(0,0,0,.10);
      --radius:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC",Arial,sans-serif;
    }
    .app{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }
    header{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(234,246,251,.96);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line);
      box-shadow:0 2px 10px rgba(0,0,0,.06);
    }
    .bar{
      max-width:1200px;
      margin:0 auto;
      padding:12px;
    }
    .title{
      text-align:center;
      font-weight:700;
      font-size:18px;
      margin:0 0 10px;
    }
    .tabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding-bottom:2px;
    }
    button.tab{
      appearance:none;
      border:1px solid var(--line);
      background:var(--card);
      color:var(--accent);
      padding:10px 13px;
      border-radius:999px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
      box-shadow:0 2px 6px rgba(0,0,0,.05);
    }
    button.tab:hover{background:#f2f8fc}
    button.tab.active{
      border-color:transparent;
      color:#fff;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
    }
    .hint{
      color:var(--sub);
      font-size:12px;
      margin-top:8px;
      text-align:center;
    }
    main{
      flex:1;
      max-width:1200px;
      width:100%;
      margin:0 auto;
      padding:12px;
    }
    iframe{
      width:100%;
      height:calc(100vh - 118px);
      min-height:650px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#fff;
      box-shadow:var(--shadow);
    }
    @media (max-width:720px){
      .title{font-size:16px}
      button.tab{padding:9px 11px;font-size:14px}
      iframe{height:calc(100vh - 122px);min-height:600px}
    }
    @media print{
      header{display:none}
      main{padding:0}
      iframe{border:0;box-shadow:none;height:100vh}
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="bar">
      <p class="title">首爾旅遊筆記</p>
      <nav class="tabs" aria-label="功能切換">
        <button class="tab active" data-page="pages/行程表.html?v=20260718-2">行程表</button>
		<button class="tab" data-page="pages/seoul_metro.html">首爾地鐵MAP</button>
        <button class="tab" data-page="pages/地鐵站文字對照.html?v=20260712-2">地鐵站文字對照</button>
        <button class="tab" data-page="pages/場所日常詞彙.html?v=20260712-3">場所日常詞彙</button>
        <button class="tab" data-page="pages/地址COPY功能.html?v=20260712-2">地址 COPY</button>
		<button class="tab" data-page="pages/image1/其他資訊.html?v=20260718-1">其他資訊</button>
      </nav>
    </div>
  </header>

  <main>
    <iframe id="viewer" src="pages/行程表.html" title="釜山旅遊內容"></iframe>
  </main>
</div>

<script>
  const viewer = document.getElementById('viewer');
  const tabs = document.querySelectorAll('.tab');

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      viewer.src = btn.dataset.page;
      viewer.title = btn.textContent.trim();
    });
  });
</script>
</body>
</html>
