<!doctype html>

<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>文字對應與複製功能</title>
  <style>
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #e2e8f0;padding:8px 10px;vertical-align:top;cursor:pointer}
    th{background:#f1f5f9;text-align:left;cursor:default}
	td{cursor:pointer}
    .copied{background:#d1fae5 !important;transition:background 0.6s}
  </style>
</head>



<body>
<!-- □ 關鍵字搜尋工具列（可多關鍵字，以空白分隔） -->
<div class="toolbar" role="region" aria-label="關鍵字搜尋工具列">
  <label class="sr-only" for="kw">搜尋:</label>
  <input id="kw" type="text" placeholder="輸入關鍵字">
  <button id="clear" type="button" title="清除並重置">清除</button>
  <!--<div class="count" id="count" aria-live="polite"></div>-->
  <label class="count" id="count" aria-live="polite"></label>

</div>
</br>
點擊內容文字可複製
<table id="dataTable">


<thead><tr><th>場所/字彙</th><th>對應韓文</th></thead>

<tbody><tr><td>地鐵</td><td>지하철</td></tr></tbody>
<tbody><tr><td>站</td><td>역</td></tr></tbody>
<tbody><tr><td>線</td><td>호선</td></tr></tbody>
<tbody><tr><td>地鐵</td><td>지하철</td></tr></tbody>
<tbody><tr><td>大學</td><td>대학교</td></tr></tbody>
<tbody><tr><td>飯店</td><td>호텔</td></tr></tbody>
<tbody><tr><td>商場</td><td>쇼핑몰</td></tr></tbody>
<tbody><tr><td>開放化妝室(廁所)</td><td>개방화장실</td></tr></tbody>
<tbody><tr><td>公用化妝室(廁所)</td><td>공용화장실</td></tr></tbody>
<tbody><tr><td>化妝室(廁所)</td><td>화장실</td></tr></tbody>



</table>


<script>
    document.querySelectorAll("td").forEach(td => {
      // 排除含有 http(s) 連結的欄位
      if (td.querySelector("a")) return;

      td.addEventListener("click", async () => {
        try {
          const text = td.innerText.trim();
          await navigator.clipboard.writeText(text);

          td.classList.add("copied");
          setTimeout(() => td.classList.remove("copied"), 600);
        } catch (err) {
          alert("複製失敗：" + err);
        }
      });
    });
	
	const kw = document.getElementById("kw");
const clearBtn = document.getElementById("clear");
const tbodyRows = Array.from(document.querySelectorAll("#dataTable tbody tr"));
const countEl = document.getElementById("count");

function updateCount() {
  const visible = tbodyRows.filter(r => !r.hidden).length;
  countEl.textContent = visible + " / " + tbodyRows.length + " 筆";
}

function applyFilter() {
  const q = kw.value.trim();
  if (!q) {
    tbodyRows.forEach(r => r.hidden = false); // 無關鍵字時顯示全部
    updateCount();
    return;
  }
  // 支援多關鍵字：空白分隔；需全部命中才顯示（AND條件）
  const terms = q.split(/\s+/).filter(Boolean).map(s => s.toLowerCase());
  tbodyRows.forEach(r => {
    const text = r.innerText.toLowerCase();
    const hit = terms.every(t => text.includes(t));
    r.hidden = !hit;
  });
  updateCount();
}

kw.addEventListener("input", applyFilter);
clearBtn.addEventListener("click", () => {
  kw.value = "";
  applyFilter();     // 立即重置回「顯示全部」
  kw.focus();
});

updateCount(); // 初始顯示筆數
	
  </script>

</body>


</html>
