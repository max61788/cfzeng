<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>購物清單後台管理</title>
  <style>
    :root{
      --bg:#f4f6f8;--panel:#fff;--text:#1f2937;--muted:#6b7280;
      --line:#d9dee5;--primary:#2563eb;--danger:#dc2626;--ok:#059669;
      --shadow:0 10px 30px rgba(0,0,0,.08);--radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .topbar{
      position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);
      backdrop-filter:blur(10px);border-bottom:1px solid var(--line)
    }
    .topbar-inner{max-width:1280px;margin:auto;padding:14px 18px;display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .brand h1{font-size:20px;margin:0}
    .brand p{font-size:13px;color:var(--muted);margin:4px 0 0}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .btn{
      border:0;border-radius:10px;padding:10px 14px;font-weight:700;background:#e5e7eb;color:#111827
    }
    .btn.primary{background:var(--primary);color:#fff}
    .btn.ok{background:var(--ok);color:#fff}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.ghost{background:#fff;border:1px solid var(--line)}
    .wrap{max-width:1280px;margin:22px auto;padding:0 18px 36px}
    .grid{display:grid;grid-template-columns:390px 1fr;gap:20px;align-items:start}
    .panel{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .panel h2{font-size:18px;margin:0 0 16px}
    .field{margin-bottom:14px}
    .field label{display:block;font-weight:700;font-size:14px;margin-bottom:7px}
    .field input,.field textarea,.field select{
      width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:#fff;color:var(--text)
    }
    .field textarea{min-height:110px;resize:vertical}
    .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
    .preview-img{
      display:none;width:100%;max-height:230px;object-fit:contain;background:#f8fafc;
      border:1px dashed var(--line);border-radius:12px;margin-top:10px
    }
    .form-actions{display:flex;gap:8px;flex-wrap:wrap}
    .list-head{display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .search{min-width:220px;flex:1;max-width:360px;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
    .count{color:var(--muted);font-size:14px}
    .empty{padding:50px 10px;text-align:center;color:var(--muted);border:2px dashed var(--line);border-radius:14px}
    .items{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .card{
      display:grid;grid-template-columns:120px 1fr;gap:14px;border:1px solid var(--line);
      border-radius:14px;padding:12px;background:#fff;position:relative
    }
    .card img{width:120px;height:120px;object-fit:cover;border-radius:10px;background:#eef2f7}
    .card .noimg{width:120px;height:120px;border-radius:10px;background:#eef2f7;display:grid;place-items:center;color:var(--muted);font-size:12px}
    .card h3{margin:0 0 6px;font-size:17px}
    .category{display:inline-block;font-size:12px;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 8px;margin-bottom:7px}
    .desc{white-space:pre-wrap;color:#4b5563;font-size:14px;line-height:1.55;max-height:88px;overflow:auto}
    .url{font-size:12px;color:var(--primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:7px}
    .card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .mini{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 9px;font-size:12px}
    .mini.edit{color:var(--primary)}
    .mini.delete{color:var(--danger)}
    .mini.move{color:#374151}
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .toast{
      position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;padding:12px 16px;
      border-radius:10px;opacity:0;transform:translateY(10px);pointer-events:none;transition:.2s;z-index:99
    }
    .toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:980px){
      .grid{grid-template-columns:1fr}
      .items{grid-template-columns:1fr}
      .panel:first-child{position:static}
    }
    @media(max-width:560px){
      .topbar-inner,.wrap{padding-left:12px;padding-right:12px}
      .toolbar{width:100%}.toolbar .btn{flex:1}
      .panel{padding:14px;border-radius:12px}
      .settings-grid{grid-template-columns:1fr}
      .card{grid-template-columns:90px 1fr}
      .card img,.card .noimg{width:90px;height:90px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>購物清單後台管理</h1>
        <p>新增商品、照片、敘述與參考網址，完成後匯出前台 HTML。</p>
      </div>
      <div class="toolbar">
        <button class="btn ghost" id="previewBtn">預覽前台</button>
        <button class="btn ok" id="exportBtn">匯出前台 HTML</button>
        <button class="btn ghost" id="backupBtn">備份資料</button>
        <button class="btn ghost" id="restoreBtn">匯入備份</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <section class="panel">
        <h2 id="formTitle">新增商品</h2>

        <div class="settings-grid">
          <div class="field">
            <label for="siteTitle">前台標題</label>
            <input id="siteTitle" value="首爾旅遊購物清單">
          </div>
          <div class="field">
            <label for="siteSubtitle">前台副標題</label>
            <input id="siteSubtitle" value="準備購買的商品與參考資訊">
          </div>
        </div>

        <hr style="border:0;border-top:1px solid var(--line);margin:4px 0 18px">

        <form id="itemForm">
          <input type="hidden" id="editId">
          <div class="field">
            <label for="name">商品名稱 *</label>
            <input id="name" required placeholder="例如：Nike Vomero 5">
          </div>
          <div class="field">
            <label for="category">分類</label>
            <input id="category" list="categoryList" placeholder="例如：鞋子、服飾、伴手禮">
            <datalist id="categoryList"></datalist>
          </div>
          <div class="field">
            <label for="description">商品敘述</label>
            <textarea id="description" placeholder="可輸入款式、尺寸、價格、店家、注意事項等"></textarea>
          </div>
          <div class="field">
            <label for="referenceUrl">參考網址</label>
            <input id="referenceUrl" type="url" placeholder="https://...">
          </div>
          <div class="field">
            <label for="imageFile">商品照片</label>
            <input id="imageFile" type="file" accept="image/*">
            <input id="imageName" placeholder="圖片檔名，例如：nike-vomero-5.jpg" style="margin-top:8px">
            <div class="hint">只會記錄圖片檔名，不會把圖片嵌入 HTML。請將圖片與匯出的前台 HTML 放在同一資料夾；也可直接手動輸入檔名。</div>
            <img id="imagePreview" class="preview-img" alt="圖片預覽">
          </div>
          <div class="form-actions">
            <button class="btn primary" type="submit" id="saveBtn">新增商品</button>
            <button class="btn ghost" type="button" id="cancelEditBtn" style="display:none">取消編輯</button>
            <button class="btn danger" type="button" id="clearAllBtn">清空全部</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="list-head">
          <div>
            <h2 style="margin-bottom:4px">商品清單</h2>
            <div class="count" id="countText">共 0 筆</div>
          </div>
          <input class="search" id="searchInput" placeholder="搜尋商品名稱、分類或敘述">
        </div>
        <div id="emptyState" class="empty">尚未新增任何商品。</div>
        <div id="items" class="items"></div>
      </section>
    </div>
  </main>

  <input type="file" id="restoreFile" accept=".json,application/json" hidden>
  <div class="toast" id="toast"></div>

<script>
(() => {
  const STORAGE_KEY = 'shopping_admin_v1';
  const $ = id => document.getElementById(id);
  const state = {
    items: [],
    settings: { title:'首爾旅遊購物清單', subtitle:'準備購買的商品與參考資訊' },
    currentImage: ''
  };

  function escapeHtml(v=''){
    return String(v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }

  function showToast(msg){
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(showToast.t);
    showToast.t = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function save(){
    state.settings.title = $('siteTitle').value.trim() || '購物清單';
    state.settings.subtitle = $('siteSubtitle').value.trim();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({items:state.items,settings:state.settings}));
    render();
  }

  function load(){
    try{
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if(Array.isArray(data.items)) state.items = data.items;
      if(data.settings) state.settings = {...state.settings,...data.settings};
    }catch(e){}
    $('siteTitle').value = state.settings.title;
    $('siteSubtitle').value = state.settings.subtitle;
    render();
  }

  function render(){
    const q = $('searchInput').value.trim().toLowerCase();
    const list = state.items.filter(x => [x.name,x.category,x.description].join(' ').toLowerCase().includes(q));
    $('countText').textContent = `共 ${state.items.length} 筆${q ? `，符合 ${list.length} 筆` : ''}`;
    $('emptyState').style.display = list.length ? 'none' : 'block';
    $('items').innerHTML = list.map((x) => {
      const index = state.items.findIndex(i => i.id === x.id);
      return `
      <article class="card">
        ${x.image ? `<img src="${x.image}" alt="${escapeHtml(x.name)}">` : `<div class="noimg">無照片</div>`}
        <div>
          ${x.category ? `<span class="category">${escapeHtml(x.category)}</span>` : ''}
          <h3>${escapeHtml(x.name)}</h3>
          <div class="desc">${escapeHtml(x.description || '')}</div>
          ${x.url ? `<div class="url">${escapeHtml(x.url)}</div>` : ''}
          <div class="card-actions">
            <button class="mini edit" data-action="edit" data-id="${x.id}">編輯</button>
            <button class="mini delete" data-action="delete" data-id="${x.id}">刪除</button>
            <button class="mini move" data-action="up" data-id="${x.id}" ${index===0?'disabled':''}>上移</button>
            <button class="mini move" data-action="down" data-id="${x.id}" ${index===state.items.length-1?'disabled':''}>下移</button>
          </div>
        </div>
      </article>`;
    }).join('');

    const categories = [...new Set(state.items.map(x=>x.category).filter(Boolean))].sort();
    $('categoryList').innerHTML = categories.map(c=>`<option value="${escapeHtml(c)}"></option>`).join('');
  }

  function resetForm(){
    $('itemForm').reset();
    $('editId').value = '';
    state.currentImage = '';
    $('imagePreview').src = '';
    $('imageName').value = '';
    $('imagePreview').style.display = 'none';
    $('formTitle').textContent = '新增商品';
    $('saveBtn').textContent = '新增商品';
    $('cancelEditBtn').style.display = 'none';
  }

  $('imageFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    $('imageName').value = file.name;
    state.currentImage = file.name;
    const localPreviewUrl = URL.createObjectURL(file);
    $('imagePreview').src = localPreviewUrl;
    $('imagePreview').style.display = 'block';
  });

  $('imageName').addEventListener('input', () => {
    state.currentImage = $('imageName').value.trim();
    const src = state.currentImage;
    if(src){
      $('imagePreview').src = src;
      $('imagePreview').style.display = 'block';
    }else{
      $('imagePreview').removeAttribute('src');
      $('imagePreview').style.display = 'none';
    }
  });

  $('itemForm').addEventListener('submit', e => {
    e.preventDefault();
    const name = $('name').value.trim();
    if(!name) return;
    let url = $('referenceUrl').value.trim();
    if(url && !/^https?:\/\//i.test(url)) url = 'https://' + url;

    const item = {
      id: $('editId').value || (Date.now().toString(36) + Math.random().toString(36).slice(2,7)),
      name,
      category: $('category').value.trim(),
      description: $('description').value.trim(),
      url,
      image: $('imageName').value.trim()
    };

    const idx = state.items.findIndex(x => x.id === item.id);
    if(idx >= 0){
      state.items[idx] = item;
      showToast('已更新商品');
    }else{
      state.items.push(item);
      showToast('已新增商品');
    }
    resetForm();
    save();
  });

  $('items').addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const id = btn.dataset.id;
    const idx = state.items.findIndex(x=>x.id===id);
    if(idx < 0) return;
    const action = btn.dataset.action;

    if(action === 'edit'){
      const x = state.items[idx];
      $('editId').value = x.id;
      $('name').value = x.name;
      $('category').value = x.category || '';
      $('description').value = x.description || '';
      $('referenceUrl').value = x.url || '';
      state.currentImage = x.image || '';
      $('imageName').value = x.image || '';
      if(x.image){
        $('imagePreview').src = x.image;
        $('imagePreview').style.display = 'block';
      }else{
        $('imagePreview').style.display = 'none';
      }
      $('formTitle').textContent = '編輯商品';
      $('saveBtn').textContent = '儲存修改';
      $('cancelEditBtn').style.display = '';
      window.scrollTo({top:0,behavior:'smooth'});
    }
    if(action === 'delete'){
      if(confirm(`確定刪除「${state.items[idx].name}」？`)){
        state.items.splice(idx,1); save(); showToast('已刪除商品');
      }
    }
    if(action === 'up' && idx > 0){
      [state.items[idx-1],state.items[idx]] = [state.items[idx],state.items[idx-1]];
      save();
    }
    if(action === 'down' && idx < state.items.length-1){
      [state.items[idx+1],state.items[idx]] = [state.items[idx],state.items[idx+1]];
      save();
    }
  });

  $('cancelEditBtn').onclick = resetForm;
  $('searchInput').addEventListener('input', render);
  $('siteTitle').addEventListener('change', save);
  $('siteSubtitle').addEventListener('change', save);

  $('clearAllBtn').onclick = () => {
    if(!state.items.length) return;
    if(confirm('確定清空全部商品？此動作無法復原。')){
      state.items = []; resetForm(); save(); showToast('已清空全部商品');
    }
  };

  function buildFrontend(){
    const title = escapeHtml($('siteTitle').value.trim() || '購物清單');
    const subtitle = escapeHtml($('siteSubtitle').value.trim());
    const data = JSON.stringify(state.items).replace(/</g,'\\u003c');

    return `<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${title}</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e2e8f0;--primary:#2563eb}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#1d4ed8,#4f46e5);color:#fff;padding:34px 18px}
.head{max-width:1180px;margin:auto}
h1{margin:0 0 8px;font-size:clamp(26px,5vw,42px)}
.sub{opacity:.9;font-size:15px}
.tools{max-width:1180px;margin:18px auto 0;padding:0 18px;display:flex;gap:10px;flex-wrap:wrap}
input,select{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fff;font:inherit}
#search{flex:1;min-width:220px}
main{max-width:1180px;margin:18px auto 40px;padding:0 18px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(15,23,42,.06);display:flex;flex-direction:column}
.image-wrap{aspect-ratio:4/3;background:#eef2f7;overflow:hidden}
.image-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.noimg{height:100%;display:grid;place-items:center;color:var(--muted)}
.content{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1}
.tag{align-self:flex-start;background:#eef2ff;color:#3730a3;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}
h2{font-size:20px;margin:0}
.desc{white-space:pre-wrap;color:#4b5563;line-height:1.65;font-size:14px;flex:1}
.link{display:block;text-align:center;text-decoration:none;background:var(--primary);color:#fff;border-radius:11px;padding:11px 14px;font-weight:700}
.link:hover{filter:brightness(.94)}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}

.viewer{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9999;display:none;overflow:hidden;touch-action:none}
.viewer.open{display:block}
.viewer-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none}
.viewer img{max-width:92vw;max-height:88vh;object-fit:contain;user-select:none;-webkit-user-drag:none;transform-origin:center center;will-change:transform}
.viewer-close,.viewer-reset{position:absolute;z-index:2;border:0;border-radius:999px;background:rgba(255,255,255,.9);color:#111827;font:700 16px/1 sans-serif;padding:12px 14px;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.viewer-close{top:14px;right:14px}
.viewer-reset{bottom:18px;left:50%;transform:translateX(-50%);font-size:14px}
.image-wrap{cursor:zoom-in}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:600px){header{padding:26px 14px}.tools,main{padding-left:12px;padding-right:12px}.grid{grid-template-columns:1fr}.card{border-radius:14px}}
</style>
</head>
<body>
<header><div class="head"><h1>${title}</h1><div class="sub">${subtitle}</div></div></header>
<div class="tools">
  <input id="search" placeholder="搜尋商品名稱、分類或敘述">
  <select id="category"><option value="">全部分類</option></select>
</div>
<main><div id="grid" class="grid"></div><div id="empty" class="empty" hidden>找不到符合條件的商品。</div></main>
<div id="viewer" class="viewer" aria-hidden="true">
  <button id="viewerClose" class="viewer-close" aria-label="關閉">✕</button>
  <div id="viewerStage" class="viewer-stage"><img id="viewerImage" alt=""></div>
  <button id="viewerReset" class="viewer-reset">還原大小</button>
</div>
<footer>本頁為個人購物參考清單</footer>
<script>
const items=${data};
const esc=v=>String(v||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
const grid=document.getElementById('grid'),empty=document.getElementById('empty'),search=document.getElementById('search'),category=document.getElementById('category');
[...new Set(items.map(x=>x.category).filter(Boolean))].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;category.appendChild(o)});
function render(){
 const q=search.value.trim().toLowerCase(),cat=category.value;
 const list=items.filter(x=>(!cat||x.category===cat)&&[x.name,x.category,x.description].join(' ').toLowerCase().includes(q));
 grid.innerHTML=list.map(x=>\`<article class="card">
   <div class="image-wrap" \${x.image?\`data-full="\${esc(x.image)}" title="點擊放大圖片"\`:''}>\${x.image?\`<img src="\${esc(x.image)}" alt="\${esc(x.name)}">\`:'<div class="noimg">無照片</div>'}</div>
   <div class="content">
     \${x.category?\`<span class="tag">\${esc(x.category)}</span>\`:''}
     <h2>\${esc(x.name)}</h2>
     <div class="desc">\${esc(x.description)}</div>
     \${x.url?\`<a class="link" href="\${esc(x.url)}" target="_blank" rel="noopener noreferrer">開啟參考網址</a>\`:''}
   </div>
 </article>\`).join('');
 empty.hidden=!!list.length;
}
search.addEventListener('input',render);category.addEventListener('change',render);render();

const viewer=document.getElementById('viewer');
const viewerImage=document.getElementById('viewerImage');
const viewerStage=document.getElementById('viewerStage');
let scale=1,tx=0,ty=0,startX=0,startY=0,startTx=0,startTy=0,startDist=0,startScale=1,dragging=false,lastTap=0;
function applyTransform(){viewerImage.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';}
function resetViewer(){scale=1;tx=0;ty=0;applyTransform();}
function openViewer(src,alt){viewerImage.src=src;viewerImage.alt=alt||'';viewer.classList.add('open');viewer.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';resetViewer();}
function closeViewer(){viewer.classList.remove('open');viewer.setAttribute('aria-hidden','true');document.body.style.overflow='';viewerImage.removeAttribute('src');resetViewer();}
document.getElementById('grid').addEventListener('click',e=>{const wrap=e.target.closest('.image-wrap[data-full]');if(wrap)openViewer(wrap.dataset.full,wrap.querySelector('img')?.alt||'');});
document.getElementById('viewerClose').addEventListener('click',closeViewer);
document.getElementById('viewerReset').addEventListener('click',resetViewer);
viewer.addEventListener('click',e=>{if(e.target===viewer)closeViewer();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeViewer();});
viewerStage.addEventListener('wheel',e=>{e.preventDefault();scale=Math.min(5,Math.max(1,scale*(e.deltaY<0?1.12:.89)));if(scale===1){tx=0;ty=0;}applyTransform();},{passive:false});
viewerStage.addEventListener('pointerdown',e=>{viewerStage.setPointerCapture(e.pointerId);dragging=true;startX=e.clientX;startY=e.clientY;startTx=tx;startTy=ty;});
viewerStage.addEventListener('pointermove',e=>{if(!dragging||scale<=1)return;tx=startTx+(e.clientX-startX);ty=startTy+(e.clientY-startY);applyTransform();});
viewerStage.addEventListener('pointerup',()=>dragging=false);viewerStage.addEventListener('pointercancel',()=>dragging=false);
viewerStage.addEventListener('touchstart',e=>{if(e.touches.length===2){startDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);startScale=scale;}else if(e.touches.length===1){const now=Date.now();if(now-lastTap<300){scale=scale>1?1:2;tx=0;ty=0;applyTransform();}lastTap=now;}},{passive:false});
viewerStage.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);scale=Math.min(5,Math.max(1,startScale*(dist/startDist)));if(scale===1){tx=0;ty=0;}applyTransform();}},{passive:false});

  function download(name, content, type){
    const blob = new Blob([content], {type});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }

  $('exportBtn').onclick = () => {
    save();
    download('shopping-list-frontend.html', buildFrontend(), 'text/html;charset=utf-8');
    showToast('已匯出前台 HTML');
  };

  $('previewBtn').onclick = () => {
    save();
    const blob = new Blob([buildFrontend()], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  };

  $('backupBtn').onclick = () => {
    save();
    download('shopping-list-backup.json', JSON.stringify({items:state.items,settings:state.settings},null,2), 'application/json');
    showToast('已匯出備份');
  };

  $('restoreBtn').onclick = () => $('restoreFile').click();
  $('restoreFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        if(!Array.isArray(data.items)) throw new Error();
        state.items = data.items;
        state.settings = {...state.settings,...(data.settings||{})};
        $('siteTitle').value = state.settings.title;
        $('siteSubtitle').value = state.settings.subtitle;
        resetForm(); save(); showToast('已匯入備份');
      }catch(err){
        alert('備份檔格式不正確。');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  load();
})();
</script>
